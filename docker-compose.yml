# HOSPO OPS — Phase 1 stack (Next.js admin + worker app + PostgreSQL).
#
# The app image is built by GitHub Actions and published to GHCR, so Portainer
# just PULLS it. Deploy as a Stack in Portainer (Stacks → Add stack → Repository),
# set the compose path to "docker-compose.yml", and set these under
# "Environment variables":
#   DB_PASSWORD             (required)  the database password you choose
#   NEXTAUTH_SECRET         (required)  admin login signing secret — openssl rand -base64 32
#   WORKER_SESSION_SECRET   (required)  worker PIN session secret  — openssl rand -base64 32
#   NEXTAUTH_URL            (required)  public URL of the app, e.g. http://192.168.1.10:3000
#   APP_URL                 (required)  same as NEXTAUTH_URL — used to generate QR codes
#   APP_PORT                (optional)  port the app is published on (default 3000)
#   APP_NAME                (optional)  display / white-label name (default "HOSPO OPS")
#   DB_USER                 (optional)  database username (default hospo_ops_user)
#
# On first start the app container auto-runs DB migrations and seeds the demo
# data (1 venue, 3 departments, 4 logins, example tasks + QR codes). Seeding is
# safe to re-run, so redeploys won't duplicate anything.
#
# Default logins after first deploy (change these in Settings):
#   admin@demo.com / 0000   bar@demo.com / 1111
#   kitchen@demo.com / 2222 foh@demo.com / 3333

services:
  db:
    image: postgres:16-alpine
    container_name: hospo-ops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospo_ops
      POSTGRES_USER: ${DB_USER:-hospo_ops_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in Portainer env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hospo_ops_user} -d hospo_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/smartcile/heavens-hospo-helper:latest
    container_name: hospo-ops-app
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      # APP_PORT controls the published host port. Container always listens on 3000.
      - "${APP_PORT:-3000}:3000"
    environment:
      # Built from the db settings above; `db` is the service hostname.
      DATABASE_URL: postgresql://${DB_USER:-hospo_ops_user}:${DB_PASSWORD}@db:5432/hospo_ops
      # Admin login (NextAuth) — secret signs the session cookie.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in Portainer env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL in Portainer env}
      # Worker PIN session — separate secret, signs the worker JWT cookie.
      WORKER_SESSION_SECRET: ${WORKER_SESSION_SECRET:?set WORKER_SESSION_SECRET in Portainer env}
      WORKER_SESSION_EXPIRY_MINUTES: ${WORKER_SESSION_EXPIRY_MINUTES:-15}
      # Used to generate the URL printed QR codes resolve to.
      APP_URL: ${APP_URL:?set APP_URL in Portainer env}
      # White-label display name, exposed to both server and client.
      APP_NAME: ${APP_NAME:-HOSPO OPS}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-HOSPO OPS}
      NEXT_PUBLIC_WORKER_SESSION_EXPIRY_MINUTES: ${WORKER_SESSION_EXPIRY_MINUTES:-15}
      # Phase 1: uploaded task photos are stored on the local volume below.
      UPLOAD_PROVIDER: local
      UPLOAD_PATH: /app/uploads
    volumes:
      # Task completion photos persist here across redeploys.
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
